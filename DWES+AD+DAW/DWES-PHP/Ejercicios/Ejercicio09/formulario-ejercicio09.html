<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Ejercicio 09</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

</head>

<body>
    <div class="container bg-secondary-subtle">
        <form action="ejercicio09.php" method="post">
            <h1>Formulario ejercicio 09 - Pedido de pizza</h1>
            <div class="row">
                <fieldset>
                    <legend>Seleccionar tipo de masa:</legend>
                    <div class="col">
                        <input class="form-radio-input" type="radio" id="fina" name="masa" value="F" required />
                        <label for="fina" class="form-radio-label">Fina (F)</label>
                    </div>
                    <div class="col">
                        <input class="form-radio-input" type="radio" id="gruesa" name="masa" value="G" required />
                        <label for="gruesa" class="form-radio-label">Gruesa (G)</label>
                    </div>
                    <div class="col">
                        <input class="form-radio-input" type="radio" id="queso" name="masa" value="Q" required />
                        <label for="queso" class="form-radio-label">Borde relleno de queso (Q)</label>
                    </div>
                    <div class="col">
                        <input class="form-radio-input" type="radio" id="sin-gluten" name="masa" value="SG" required />
                        <label for="sin_gluten" class="form-radio-label">Sin gluten (SG)</label>
                    </div>
                </fieldset>
                <fieldset>
                    <legend>Seleccionar el tamaño:</legend>
                    <div class="col">
                        <input class="form-radio-input" type="radio" id="small" name="size" value="S" required />
                        <label for="small" class="form-radio-label">Pequeña (S)</label>
                    </div>
                    <div class="col">
                        <input class="form-radio-input" type="radio" id="medium" name="size" value="M" required />
                        <label for="medium" class="form-radio-label">Mediana (M)</label>
                    </div>
                    <div class="col">
                        <input class="form-radio-input" type="radio" id="large" name="size" value="L" required />
                        <label for="large" class="form-radio-label">Grande (L)</label>
                    </div>
                    <div class="col">
                        <input class="form-radio-input" type="radio" id="extra_large" name="size" value="XL" required />
                        <label for="extra_large" class="form-radio-label">Gigante (XL)</label>
                    </div>
                </fieldset>
                <fieldset>
                    <legend>Seleccionar la pizza base:</legend>
                    <div class="col">
                        <input class="form-radio-input" type="radio" id="margarita" name="pizza_base" value="M"
                            required />
                        <label for="margarita" class="form-radio-label">Margarita (M)</label>
                    </div>
                    <div class="col">
                        <input class="form-radio-input" type="radio" id="barbacoa" name="pizza_base" value="BBQ"
                            required />
                        <label for="barbacoa" class="form-radio-label">Barbacoa (BBQ)</label>
                    </div>
                    <div class="col">
                        <input class="form-radio-input" type="radio" id="cuatro_quesos" name="pizza_base" value="4Q"
                            required />
                        <label for="cuatro_quesos" class="form-radio-label">Cuatro quesos (4Q)</label>
                    </div>
                </fieldset>
                <fieldset>
                    <legend>Seleccionar ingredientes adicionales:</legend>
                    <div class="col">
                        <input class="form-check-input" type="checkbox" id="pimiento" name="ingredientes[]"
                            value="IA-PI" />
                        <label for="pimiento" class="form-check-label">Pimiento (IA-PI)</label>
                    </div>
                    <div class="col-12 col-sm-6">
                        <input class="form-check-input" type="checkbox" id="cebolla" name="ingredientes[]"
                            value="IA-CE" />
                        <label for="cebolla" class="form-check-label">Cebolla (IA-CE)</label>
                    </div>
                    <div class="col">
                        <input class="form-check-input" type="checkbox" id="carne_picada" name="ingredientes[]"
                            value="IA-CP" />
                        <label for="carne_picada" class="form-check-label">Carne picada (IA-CP)</label>
                    </div>
                    <div class="col">
                        <input class="form-check-input" type="checkbox" id="pollo" name="ingredientes[]"
                            value="IA-PL" />
                        <label for="pollo" class="form-check-label">Pollo (IA-PL)</label>
                    </div>
                    <div class="col">
                        <input class="form-check-input" type="checkbox" id="berenjena" name="ingredientes[]"
                            value="IA-BE" />
                        <label for="berenjena" class="form-check-label">Berenjena (IA-BE)</label>
                    </div>
                    <div class="col">
                        <input class="form-check-input" type="checkbox" id="extra-queso" name="ingredientes[]"
                            value="IA-XQ" />
                        <label for="extra-queso" class="form-check-label">Extra de queso (IA-XQ)</label>
                    </div>
                    <div class="col">
                        <input class="form-check-input" type="checkbox" id="salsa-barbacoa" name="ingredientes[]"
                            value="IA-BBQ" />
                        <label for="salsa-barbacoa" class="form-check-label">Salsa barbacoa (IA-BBQ)</label>
                    </div>
                </fieldset>
                <fieldset>
                    <legend>Datos de entrega:</legend>
                    <div class="col-12 col-sm-6">
                        <label for="nombre" class="form-label">Nombre: </label>
                        <input class="form-control" type="text" name="nombre" id="nombre" required />
                    </div>
                    <div class="col-12 col-sm-6">
                        <label for="apellidos" class="form-label">Apellidos: </label>
                        <input class="form-control" type="text" name="apellidos" id="apellidos" required />
                    </div>
                    <div class="col-12 col-sm-6">
                        <label for="direccion" class="form-label">Dirección completa: </label>
                        <input class="form-control" type="text" name="direccion" id="direccion" required />
                    </div>
                    <div class="col-12 col-sm-6">
                        <label for="telefono" class="form-label">Teléfono: </label>
                        <input class="form-control" type="tel" name="telefono" id="telefono" required />
                    </div>
                    <div class="col-12 col-sm-6">
                        <label for="observaciones" class="form-label">Observaciones: </label>
                        <textarea class="form-control" name="observaciones" id="observaciones"></textarea>
                    </div>
                </fieldset>
                <fieldset>
                    <legend>Método de pago:</legend>
                    <div class="col-12 col-sm-6">
                        <select class="form-select" name="pago" id="pago" required>
                            <option selected>Seleccione...</option selected>
                            <option value="T">Tarjeta bancaria (T)</option>
                            <option value="B">Bizum (B)</option>
                            <option value="P">PayPal (P)</option>
                        </select>
                    </div>
                </fieldset>
            </div>
            <div class="row">
                <div class="col p-3">
                    <button type="submit" class="btn btn-primary w-100">Enviar</button>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
