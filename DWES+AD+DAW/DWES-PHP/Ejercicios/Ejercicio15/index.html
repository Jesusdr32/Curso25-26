<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
</head>

<body>
    <form action="procesar.php" method="post" enctype="multipart/form-data">
        <div>
            <label for="nombre">Nombre: </label>
            <input type="text" name="nombre" id="nombre" minlength="10" required>
        </div>
        <div>
            <label for="apellidos">Apellidos: </label>
            <input type="text" name="apellidos" id="apellidos" minlength="10" required>
        </div>
        <div>
            <label for="edad">Edad: </label>
            <input type="number" name="edad" id="edad" min="18" max="70" required>
        </div>
        <div>
            <label for="documentacion">Documentacion: </label>
            <input type="file" name="documentacion" id="documentacion" accept="application/pdf" required>
        </div>
        <div>
            <input type="submit" value="Enviar">
        </div>
    </form>
</body>

</html>
