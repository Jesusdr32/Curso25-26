<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRY! - Página Principal</title>
    <link rel="stylesheet" href="pry_pagina_principal.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="overlay"></div>

    <header class="header">
      <div class="header-top">
        <div class="logo-area">
          <a href="#"
            ><img src="Imagenes/PRY!.png" alt="PRY! logo" class="logo"
          /></a>
        </div>

        <div class="auth-buttons">
          <button>Login</button>
          <button>Register</button>
        </div>
      </div>

      <div class="header-search">
        <nav class="nav-bar">
          <input type="checkbox" id="menu-toggle" />
          <label for="menu-toggle" class="menu-btn">
            <span class="hamb">☰</span>
            <span class="close">✖</span>
          </label>

          <div class="menu">
            <a href="#">Java</a>
            <a href="#">HTML</a>
            <a href="#">JavaScript</a>
            <a href="#">PHP</a>
            <a href="#">MySQL</a>
            <a href="#">Python</a>
            <a href="#">CSS</a>
          </div>
        </nav>

        <input type="text" class="search-input" placeholder="Buscar ..." />
        <button class="search-btn">🔍</button>
      </div>
    </header>

    <main>
      <section class="course-section">
        <h2>Destacados</h2>
        <div class="course-grid">
          <div class="course-card">
            <img
              src="Imagenes/html-logo-removebg-preview.png"
              alt="Curso HTML"
            />
            <p class="course-title">HTML</p>
            <p class="course-price">€</p>
            <div class="stars">⭐⭐⭐⭐⭐</div>
          </div>
          <div class="course-card">
            <img src="Imagenes/JS-logo-removebg-preview.png" alt="Curso JS" />
            <p class="course-title">JavaScript</p>
            <p class="course-price">€</p>
            <div class="stars">⭐⭐⭐⭐⭐</div>
          </div>
          <div class="course-card">
            <img src="Imagenes/php-logo-removebg-preview.png" alt="Curso PHP" />
            <p class="course-title">PHP</p>
            <p class="course-price">€</p>
            <div class="stars">⭐⭐⭐⭐⭐</div>
          </div>
          <div class="course-card">
            <img src="Imagenes/JS-logo-removebg-preview.png" alt="Curso JS" />
            <p class="course-title">JavaScript</p>
            <p class="course-price">€</p>
            <div class="stars">⭐⭐⭐⭐⭐</div>
          </div>
        </div>
      </section>

      <section class="course-section">
        <h2>Para ti</h2>
        <div class="course-grid">
          <div class="course-card">
            <img
              src="Imagenes/html-logo-removebg-preview.png"
              alt="Curso HTML"
            />
            <p class="course-title">HTML</p>
            <p class="course-price">€</p>
            <div class="stars">⭐⭐⭐⭐⭐</div>
          </div>
          <div class="course-card">
            <img src="Imagenes/JS-logo-removebg-preview.png" alt="Curso JS" />
            <p class="course-title">JavaScript</p>
            <p class="course-price">€</p>
            <div class="stars">⭐⭐⭐⭐⭐</div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-social">
        <img src="Imagenes/youtube.png" alt="Icono youtube" />
        <img src="Imagenes/ig.png" alt="icono ig" />
      </div>

      <div>
        <p class="footer-text">Lorem ipsum dolor sit amet...</p>
        <p class="footer-copy">Lorem ipsum dolor sit amet consectetur...</p>
      </div>

      <div class="footer-social">
        <img src="Imagenes/discord-removebg-preview.png" alt="icono discord" />
        <img
          src="Imagenes/linkedIn-removebg-preview.png"
          alt="icono linkedIn"
        />
      </div>
    </footer>
  </body>
</html>
